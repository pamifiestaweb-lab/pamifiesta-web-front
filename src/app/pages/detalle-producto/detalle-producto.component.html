<div class="container mt-5" *ngIf="servicio">
  <h1 class="text-azul mb-4">{{ servicio.nombre }}</h1>
  <div class="row">
    <div class="col-md-6">
      <img [src]="servicio.imagen" class="img-fluid rounded shadow-sm" />
    </div>
    <div class="col-md-6">
      <h4 class="mb-3">Descripción</h4>
      <p>{{ servicio.descripcion }}</p>
      <p><strong>Tipo:</strong> {{ servicio.tipo }}</p>
      <p><strong>Categoría:</strong> {{ servicio.categoria }}</p>
      <p><strong>Precio:</strong> ${{ servicio.precio }}</p>
      <a routerLink="/" class="btn btn-rojo mt-3">← Volver al catálogo</a>
    </div>
  </div>
</div>
